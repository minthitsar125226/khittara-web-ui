<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Clean Oval UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold': { 50: '#fffbeb', 100: '#fef9c3', 500: '#eab308', 600: '#ca8a04' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .oval-input { border-radius: 9999px; }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center relative p-6">

    <button onclick="toggleSettings()" class="absolute top-8 right-8 text-gray-400 hover:text-gold-600 transition-all duration-300">
        <i class="fas fa-cog text-2xl"></i>
    </button>

    <div class="w-full max-w-2xl text-center space-y-12">
        <div class="space-y-2">
            <h1 class="text-4xl font-bold tracking-tight text-gray-900">Khittara <span class="text-gold-500 text-5xl">.</span></h1>
            <p class="text-gray-400 font-light">How can I assist your project today?</p>
        </div>

        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-gold-100 to-gold-50 rounded-[50px] blur opacity-25 group-focus-within:opacity-100 transition duration-1000"></div>
            <div class="relative flex items-center bg-white border border-gray-100 oval-input p-2 shadow-sm hover:shadow-md transition-all duration-300">
                <input type="text" placeholder="Ask anything to Khittara..." 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-4 text-lg outline-none text-gray-800">
                <button class="bg-gold-500 hover:bg-gold-600 text-white w-12 h-12 rounded-full shadow-lg transition-transform active:scale-95">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-3">
            <button class="px-4 py-2 rounded-full border border-gray-100 text-xs text-gray-500 hover:bg-gray-50 transition">Explain Code</button>
            <button class="px-4 py-2 rounded-full border border-gray-100 text-xs text-gray-500 hover:bg-gray-50 transition">Plan a Project</button>
            <button class="px-4 py-2 rounded-full border border-gray-100 text-xs text-gray-500 hover:bg-gray-50 transition">Translate Text</button>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/5 flex items-center justify-center hidden z-50 backdrop-blur-md">
        <div class="bg-white border border-gray-100 w-full max-w-md p-10 rounded-[40px] shadow-2xl transition-all duration-300 scale-100">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900">Settings</h2>
                <button onclick="toggleSettings()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4 pb-6 border-b border-gray-50">
                    <button class="py-3 px-4 rounded-2xl bg-gray-900 text-white font-medium hover:bg-gray-800 transition text-sm">Sign In</button>
                    <button class="py-3 px-4 rounded-2xl border border-gray-200 text-gray-700 font-medium hover:bg-gray-50 transition text-sm">Register</button>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Language</label>
                    <select class="w-full bg-gray-50 border-none rounded-2xl p-4 outline-none text-sm cursor-pointer">
                        <option>Burmese (မြန်မာ)</option>
                        <option>English</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Gemini API Key</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-gold-500"></i>
                        <input type="password" placeholder="AIzaSy..." class="w-full bg-gray-50 border-none rounded-2xl p-4 pl-12 text-sm outline-none">
                    </div>
                </div>
                
                <button onclick="toggleSettings()" class="w-full bg-gold-500 hover:bg-gold-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-gold-100 transition-all mt-4">Save & Close</button>
            </div>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.classList.toggle('hidden');
        }
    </script>
</body>
</html>
