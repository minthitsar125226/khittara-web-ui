<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Khittara AI Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white transition-colors duration-300 overflow-hidden">
    <button id="menuToggleBtn" onclick="window.toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div id="sidebarOverlay" onclick="window.toggleSidebar()"></div>
    <nav class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-zinc-950 z-[10001] transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col shadow-2xl" id="mainSidebar">
        <div class="flex justify-between items-center px-4 py-6 mb-4">
            <div class="flex items-center">
                <div class="logo-box w-8 h-8 bg-yellow-500 rounded-lg mr-3 flex items-center justify-center text-white font-bold">K</div>
                <span class="text-xl font-bold tracking-tight logo-text">Khittara <span class="text-yellow-500">.</span></span>
            </div>
            <button onclick="window.toggleSidebar()" class="text-gray-400 hover:text-red-500 p-2"><i class="fas fa-times text-xl"></i></button>
        </div>
        <div class="sidebar-item px-4" onclick="window.switchView('home')"><i class="fas fa-home"></i><span class="sidebar-label ml-3">Dashboard</span></div>
        <div class="sidebar-item px-4" onclick="newChat()"><i class="fas fa-comment-alt"></i><span class="sidebar-label ml-3">AI Chat</span></div>
        <div class="mt-8 mb-2 px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">History</div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto px-2 chat-scroll space-y-1"></div>
        <div class="mt-auto border-t border-gray-100 dark:border-zinc-800 p-4">
            <div class="sidebar-item" onclick="window.toggleSettings()"><i class="fas fa-cog"></i><span class="sidebar-label ml-3">Settings</span></div>
        </div>
    </nav>
    <main class="h-screen w-screen overflow-hidden relative flex flex-col">
        <section id="homeView" class="view-container flex flex-col items-center justify-center p-6 text-center view-active grow">
            <div class="max-w-2xl w-full">
                <h1 class="text-5xl md:text-7xl font-extrabold mb-4 logo-text">Khittara <span class="text-yellow-500">.</span></h1>
                <p class="text-gray-500 mb-10 text-lg">Empowering your vision with AI.</p>
                <div class="bg-white dark:bg-zinc-900 shadow-2xl rounded-[30px] flex p-2 border border-gray-100 dark:border-zinc-800 max-w-lg mx-auto">
                    <input type="text" id="initialInput" class="flex-1 bg-transparent px-4 py-3 outline-none" placeholder="Message Khittara...">
                    <button onclick="sendMessage('initialInput')" class="bg-yellow-500 text-white w-12 h-12 rounded-2xl shadow-lg flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>
        <section id="chatView" class="view-container hidden flex-col h-full overflow-hidden">
            <div class="px-6 py-4 border-b dark:border-zinc-800 flex items-center justify-between bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md shrink-0 z-10">
                <div class="flex items-center ml-10"><div class="w-2 h-2 bg-green-500 rounded-full mr-3 animate-pulse"></div><span class="font-bold text-sm">Khittara AI Engine</span></div>
                <button onclick="newChat()" class="text-[10px] bg-gray-100 dark:bg-zinc-800 px-3 py-1.5 rounded-lg font-bold uppercase">New Chat</button>
            </div>
            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 md:p-10 chat-scroll"></div>
            <div class="input-area shrink-0">
                <div class="max-w-4xl mx-auto bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-[24px] flex p-1.5 shadow-2xl">
                    <textarea id="chatInput" class="flex-1 bg-transparent px-4 py-2 outline-none text-sm resize-none self-center" placeholder="Type message..." rows="1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button onclick="sendMessage('chatInput')" class="bg-yellow-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg self-end mb-0.5"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </section>
    </main>
    <div id="settingsModal" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden items-center justify-center z-[10002]">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md p-6 rounded-[35px] shadow-2xl mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Settings</h2>
                <button onclick="window.toggleSettings()"><i class="fas fa-times text-gray-400 p-2"></i></button>
            </div>
            <div class="space-y-4 max-h-[65vh] overflow-y-auto pr-2 chat-scroll">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block tracking-widest">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" class="w-full p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl outline-none border border-transparent focus:border-yellow-500" placeholder="Paste your key here">
                </div>
                <div class="flex justify-between items-center p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl">
                    <span class="font-medium">Dark Mode</span>
                    <button onclick="window.toggleTheme()" class="text-3xl text-yellow-500"><i class="fas fa-toggle-off" id="themeIcon"></i></button>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block tracking-widest">Font Size</label>
                    <div class="p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl"><input type="range" id="fontSizeSlider" min="0" max="2" value="1" step="1" class="w-full accent-yellow-500"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block tracking-widest">Icon Size</label>
                    <div class="p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl"><input type="range" id="iconSizeSlider" min="0" max="2" value="1" step="1" class="w-full accent-yellow-500"></div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block tracking-widest">Logo Size</label>
                    <div class="p-4 bg-gray-50 dark:bg-zinc-800 rounded-2xl"><input type="range" id="logoSizeSlider" min="0" max="2" value="1" step="1" class="w-full accent-yellow-500"></div>
                </div>
                <button onclick="window.saveSettings()" class="w-full bg-yellow-500 text-white py-4 rounded-2xl font-bold mt-4">Save Changes</button>
            </div>
        </div>
    </div>
    <script src="ai-config.js"></script>
    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/chat.js"></script>
</body>
</html>
