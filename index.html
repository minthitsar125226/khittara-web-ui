<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Personal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="ai-config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'gold': { 50: '#fffbeb', 100: '#fef9c3', 500: '#eab308', 600: '#ca8a04' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .oval-input { border-radius: 9999px; }
        .hidden-view { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }

        /* Thinking Animation */
        .thinking-glow {
            animation: pulse-glow 1.5s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0% { color: #10b981; filter: drop-shadow(0 0 2px #10b981); transform: scale(1); }
            50% { color: #eab308; filter: drop-shadow(0 0 10px #eab308); transform: scale(1.1); }
            100% { color: #10b981; filter: drop-shadow(0 0 2px #10b981); transform: scale(1); }
        }

        /* Markdown Styling */
        .prose { font-size: 0.95rem; line-height: 1.6; }
        .prose pre { background: #1e1e1e; padding: 1.25rem; border-radius: 1rem; overflow-x: auto; margin: 15px 0; border: 1px solid #333; }
        .prose code { font-family: monospace; color: #f59e0b; background: #fef9c3; padding: 2px 4px; border-radius: 4px; }
        .prose pre code { background: transparent; padding: 0; color: inherit; }
    </style>
</head>
<body class="h-screen relative text-gray-800">

    <button onclick="toggleSettings()" class="absolute top-8 right-8 text-gray-300 hover:text-gold-600 transition-all duration-300 z-50">
        <i class="fas fa-cog text-2xl"></i>
    </button>

    <section id="homeView" class="h-full flex flex-col items-center justify-center p-6 space-y-12 fade-in">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-bold tracking-tight">Khittara <span class="text-gold-500 text-6xl">.</span></h1>
            <p class="text-gray-400 font-light">The next generation AI platform.</p>
        </div>
        <div class="w-full max-w-2xl relative">
            <div class="relative flex items-center bg-white border border-gray-100 oval-input p-2 shadow-sm focus-within:shadow-lg transition-all">
                <input type="text" id="initialInput" placeholder="Ask anything to Khittara..." class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-5 text-lg outline-none">
                <button onclick="startChat()" class="bg-gold-500 hover:bg-gold-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center">
                    <i class="fas fa-arrow-up text-xl"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="chatView" class="h-full flex flex-col hidden-view bg-white">
        <header class="p-6 border-b border-gray-50 flex justify-between items-center px-12 bg-white/80 sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-900 cursor-pointer" onclick="goHome()">Khittara <span class="text-gold-500">.</span></h2>
            <div class="flex items-center space-x-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <span id="activeModelLabel">Model Ready</span>
                <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full"></div>
            </div>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-12 space-y-8 chat-scroll max-w-4xl mx-auto w-full pb-32"></div>

        <footer class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white">
            <div class="max-w-4xl mx-auto flex items-center bg-gray-50 oval-input p-2 border border-gray-100 focus-within:bg-white focus-within:shadow-xl transition-all">
                <input type="text" id="chatInput" placeholder="Send a message..." class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-3 outline-none">
                <button onclick="sendMessage()" class="bg-gold-500 hover:bg-gold-600 text-white w-10 h-10 rounded-full shadow-md">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </section>

    <div id="settingsModal" class="fixed inset-0 bg-black/10 backdrop-blur-md flex items-center justify-center hidden-view z-50">
        <div class="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl">
            <h2 class="text-2xl font-bold mb-8">Settings</h2>
            <div class="space-y-6">
                <input type="password" id="apiKeyInput" placeholder="API Key" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none">
                <input type="text" id="modelInput" placeholder="Model Name" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none">
                <button onclick="saveSettings()" class="w-full bg-gold-500 text-white py-4 rounded-2xl font-bold">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');

        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('khittara_api_key') || '';
            document.getElementById('modelInput').value = localStorage.getItem('khittara_model') || 'gemini-2.5-flash';
        };

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden-view'); }
        function saveSettings() {
            localStorage.setItem('khittara_api_key', document.getElementById('apiKeyInput').value);
            localStorage.setItem('khittara_model', document.getElementById('modelInput').value);
            toggleSettings();
        }

        function goHome() {
            document.getElementById('chatView').classList.add('hidden-view');
            document.getElementById('homeView').classList.remove('hidden-view');
        }

        function startChat() {
            const val = document.getElementById('initialInput').value.trim();
            if (!val) return;
            document.getElementById('homeView').classList.add('hidden-view');
            document.getElementById('chatView').classList.remove('hidden-view');
            appendMessage('user', val);
            processAI(val);
            document.getElementById('initialInput').value = '';
        }

        function sendMessage() {
            const val = document.getElementById('chatInput').value.trim();
            if (!val) return;
            appendMessage('user', val);
            processAI(val);
            document.getElementById('chatInput').value = '';
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in mb-4`;
            const htmlContent = role === 'ai' ? marked.parse(text) : text;
            msgDiv.innerHTML = `<div class="${role === 'user' ? 'bg-gold-500 text-white' : 'bg-gray-50 text-gray-800 prose'} p-5 rounded-3xl max-w-[85%] shadow-sm border border-gray-100">${htmlContent}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- Thinking Indicator Logic ---
        function showThinking() {
            if(document.getElementById('thinkingIndicator')) return; // ရှိပြီးသားဆို ထပ်မပြဘူး
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinkingIndicator';
            thinkingDiv.className = 'flex justify-start fade-in mb-4';
            thinkingDiv.innerHTML = `
                <div class="bg-gray-50 p-4 rounded-3xl flex items-center space-x-3 border border-gray-100 shadow-sm">
                    <i class="fas fa-microchip thinking-glow text-lg"></i>
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Khittara is thinking...</span>
                </div>`;
            chatMessages.appendChild(thinkingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideThinking() {
            const indicator = document.getElementById('thinkingIndicator');
            if (indicator) indicator.remove();
        }

        async function processAI(prompt) {
            showThinking(); // API မခေါ်ခင် animation အရင်ပြမယ်
            try {
                const aiResponse = await AI_CONFIG.fetchAIResponse(prompt);
                hideThinking(); // အဖြေရတာနဲ့ animation ဖြုတ်မယ်
                appendMessage('ai', aiResponse);
            } catch (error) {
                hideThinking();
                appendMessage('ai', `Error: ${error.message}`);
            }
        }
    </script>
</body>
</html>
