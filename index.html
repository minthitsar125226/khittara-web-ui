<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Elegant Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'gold': { 50: '#fffbeb', 100: '#fef9c3', 500: '#eab308', 600: '#ca8a04' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .oval-input { border-radius: 9999px; }
        .hidden-view { display: none !important; }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
    </style>
</head>
<body class="h-screen relative text-gray-800">

    <button onclick="toggleSettings()" class="absolute top-8 right-8 text-gray-300 hover:text-gold-600 transition-all duration-300 z-50">
        <i class="fas fa-cog text-2xl"></i>
    </button>

    <section id="homeView" class="h-full flex flex-col items-center justify-center p-6 space-y-12 transition-all duration-500">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-bold tracking-tight">Khittara <span class="text-gold-500 text-6xl">.</span></h1>
            <p class="text-gray-400 font-light">Your intelligent assistant, redefined.</p>
        </div>

        <div class="w-full max-w-2xl relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-gold-100 to-gold-50 rounded-[50px] blur opacity-20 group-focus-within:opacity-100 transition duration-1000"></div>
            <div class="relative flex items-center bg-white border border-gray-100 oval-input p-2 shadow-sm focus-within:shadow-lg transition-all">
                <input type="text" id="initialInput" onkeypress="handleKeyPress(event)" placeholder="Ask Khittara anything..." 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-5 text-lg outline-none">
                <button onclick="startChat()" class="bg-gold-500 hover:bg-gold-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center">
                    <i class="fas fa-arrow-up text-xl"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="chatView" class="h-full flex flex-col hidden-view bg-white">
        <header class="p-6 border-b border-gray-50 flex justify-between items-center px-12">
            <h2 class="text-xl font-bold text-gray-900 cursor-pointer" onclick="location.reload()">Khittara <span class="text-gold-500">.</span></h2>
            <div class="flex items-center space-x-4 text-xs font-medium text-gray-400">
                <span id="statusLabel">Gemini 1.5 Flash Ready</span>
                <div class="w-2 h-2 bg-green-500 rounded-full"></div>
            </div>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-12 space-y-8 chat-scroll max-w-4xl mx-auto w-full">
            </div>

        <footer class="p-8">
            <div class="max-w-4xl mx-auto flex items-center bg-gray-50 oval-input p-2 border border-gray-100 focus-within:bg-white focus-within:border-gold-300 transition-all">
                <input type="text" id="chatInput" onkeypress="handleKeyPress(event)" placeholder="Follow up..." 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-3 outline-none">
                <button onclick="sendMessage()" class="bg-gold-500 hover:bg-gold-600 text-white w-10 h-10 rounded-full shadow-md">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </section>

    <div id="settingsModal" class="fixed inset-0 bg-black/5 backdrop-blur-md flex items-center justify-center hidden-view z-50">
        <div class="bg-white border border-gray-100 w-full max-w-md p-10 rounded-[40px] shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Settings</h2>
                <button onclick="toggleSettings()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-4 pb-4">
                    <button class="py-3 px-4 rounded-2xl bg-black text-white text-sm font-medium">Login</button>
                    <button class="py-3 px-4 rounded-2xl border border-gray-100 text-sm">Register</button>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Language</label>
                    <select id="langSelect" class="w-full bg-gray-50 rounded-2xl p-4 outline-none text-sm">
                        <option value="my">Burmese (မြန်မာ)</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="Enter API Key" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none">
                </div>
                <button onclick="saveSettings()" class="w-full bg-gold-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-gold-100">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Load Settings on Start
        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('khittara_api_key') || '';
            document.getElementById('langSelect').value = localStorage.getItem('khittara_lang') || 'my';
        };

        function toggleSettings() {
            document.getElementById('settingsModal').classList.toggle('hidden-view');
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value;
            const lang = document.getElementById('langSelect').value;
            localStorage.setItem('khittara_api_key', key);
            localStorage.setItem('khittara_lang', lang);
            toggleSettings();
            alert('Settings Saved!');
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                const view = document.getElementById('homeView').classList.contains('hidden-view') ? 'chat' : 'home';
                view === 'home' ? startChat() : sendMessage();
            }
        }

        function startChat() {
            const input = document.getElementById('initialInput');
            if (!input.value.trim()) return;
            
            const firstMsg = input.value;
            document.getElementById('homeView').classList.add('hidden-view');
            document.getElementById('chatView').classList.remove('hidden-view');
            
            appendMessage('user', firstMsg);
            input.value = '';
            processAI(firstMsg);
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (!input.value.trim()) return;
            
            const msg = input.value;
            appendMessage('user', msg);
            input.value = '';
            processAI(msg);
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const inner = role === 'user' 
                ? `<div class="bg-gold-500 text-white p-5 rounded-3xl rounded-tr-none max-w-[80%] shadow-sm">${text}</div>`
                : `<div class="bg-gray-50 text-gray-800 p-5 rounded-3xl rounded-tl-none max-w-[80%] border border-gray-100 shadow-sm">${text}</div>`;
            
            msgDiv.innerHTML = inner;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function processAI(prompt) {
            const apiKey = localStorage.getItem('khittara_api_key');
            if (!apiKey) {
                appendMessage('ai', 'ကျေးဇူးပြု၍ Setting ထဲမှာ Gemini API Key အရင်ထည့်ပေးပါ။');
                return;
            }

            document.getElementById('statusLabel').innerText = 'Thinking...';
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                appendMessage('ai', aiResponse);
            } catch (error) {
                appendMessage('ai', 'Error: API နဲ့ ချိတ်ဆက်လို့မရပါ။ Key မှန်မမှန် ပြန်စစ်ပေးပါ။');
            } finally {
                document.getElementById('statusLabel').innerText = 'Gemini 1.5 Flash Ready';
            }
        }
    </script>
</body>
</html>
