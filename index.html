<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Personal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="ai-config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { 'gold': { 50: '#fffbeb', 100: '#fef9c3', 500: '#eab308', 600: '#ca8a04' } } }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .oval-input { border-radius: 9999px; }
        .hidden-view { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }
        .sidebar-item { transition: all 0.2s; cursor: pointer; border-radius: 12px; margin-bottom: 4px; }
        .sidebar-item:hover { background-color: #fef9c3; color: #ca8a04; }
        
        .thinking-glow { animation: pulse-glow 1.5s infinite ease-in-out; }
        @keyframes pulse-glow {
            0%, 100% { color: #10b981; filter: drop-shadow(0 0 2px #10b981); }
            50% { color: #eab308; filter: drop-shadow(0 0 8px #eab308); }
        }
        .prose pre { background: #1e1e1e; padding: 1rem; border-radius: 1rem; overflow-x: auto; margin: 10px 0; }
    </style>
</head>
<body class="h-screen flex text-gray-800">

    <section id="homeView" class="fixed inset-0 bg-white z-40 flex flex-col items-center justify-center p-6 space-y-12 fade-in">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-bold">Khittara <span class="text-gold-500 text-6xl">.</span></h1>
            <p class="text-gray-400 font-light text-lg">The next generation AI platform.</p>
        </div>
        <div class="w-full max-w-2xl">
            <div class="relative flex items-center bg-white border border-gray-100 oval-input p-2 shadow-sm focus-within:shadow-xl transition-all">
                <input type="text" id="initialInput" placeholder="Ask anything..." class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-5 text-lg outline-none">
                <button onclick="startChat()" class="bg-gold-500 hover:bg-gold-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center">
                    <i class="fas fa-arrow-up text-xl"></i>
                </button>
            </div>
        </div>
        <button onclick="toggleSettings()" class="text-gray-300 hover:text-gold-500 transition-colors"><i class="fas fa-cog text-xl"></i></button>
    </section>

    <main id="chatView" class="flex-1 flex hidden-view h-full">
        
        <aside class="w-72 bg-gray-50 border-r border-gray-100 flex flex-col p-6 h-full">
            <button onclick="newChat()" class="flex items-center justify-center space-x-2 bg-white border border-gray-100 py-3 rounded-2xl shadow-sm hover:shadow-md transition-all mb-8 font-bold text-sm">
                <i class="fas fa-plus text-gold-500"></i>
                <span>New Chat</span>
            </button>
            
            <div class="flex-1 overflow-y-auto chat-scroll space-y-1">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 ml-2">Recent Chats</p>
                <div id="historyList">
                    </div>
            </div>

            <div class="pt-6 border-t border-gray-100">
                <button onclick="toggleSettings()" class="flex items-center space-x-3 text-gray-500 hover:text-gold-600 transition-colors px-2">
                    <i class="fas fa-cog"></i>
                    <span class="text-sm font-medium">Settings</span>
                </button>
            </div>
        </aside>

        <section class="flex-1 flex flex-col bg-white relative">
            <header class="p-6 border-b border-gray-50 flex justify-between items-center px-12">
                <h2 class="text-xl font-bold cursor-pointer" onclick="goHome()">Khittara <span class="text-gold-500">.</span></h2>
                <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full"></div>
            </header>

            <div id="chatMessages" class="flex-1 overflow-y-auto p-12 space-y-8 chat-scroll max-w-4xl mx-auto w-full pb-32"></div>

            <footer class="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white">
                <div class="max-w-4xl mx-auto flex items-center bg-gray-50 oval-input p-2 border border-gray-100 focus-within:bg-white focus-within:shadow-xl transition-all">
                    <input type="text" id="chatInput" placeholder="Send a message..." class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-3 outline-none">
                    <button onclick="sendMessage()" class="bg-gold-500 hover:bg-gold-600 text-white w-10 h-10 rounded-full shadow-md">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </footer>
        </section>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/10 backdrop-blur-md flex items-center justify-center hidden-view z-50">
        <div class="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Settings</h2>
                <button onclick="toggleSettings()"><i class="fas fa-times text-gray-400"></i></button>
            </div>
            <div class="space-y-6">
                <input type="password" id="apiKeyInput" placeholder="API Key" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none">
                <input type="text" id="modelInput" placeholder="Model Name" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none">
                <button onclick="saveSettings()" class="w-full bg-gold-500 text-white py-4 rounded-2xl font-bold">Save Changes</button>
                <button onclick="clearAllHistory()" class="w-full border border-red-100 text-red-500 py-4 rounded-2xl font-medium text-sm hover:bg-red-50">Clear History</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;
        const chatMessages = document.getElementById('chatMessages');
        const historyList = document.getElementById('historyList');

        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('khittara_api_key') || '';
            document.getElementById('modelInput').value = localStorage.getItem('khittara_model') || 'gemini-2.5-flash';
            loadHistoryList();
        };

        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden-view'); }
        function saveSettings() {
            localStorage.setItem('khittara_api_key', document.getElementById('apiKeyInput').value);
            localStorage.setItem('khittara_model', document.getElementById('modelInput').value);
            toggleSettings();
        }

        function goHome() {
            document.getElementById('homeView').classList.remove('hidden-view');
            document.getElementById('chatView').classList.add('hidden-view');
        }

        function newChat() {
            currentChatId = Date.now().toString();
            chatMessages.innerHTML = '';
            document.getElementById('homeView').classList.add('hidden-view');
            document.getElementById('chatView').classList.remove('hidden-view');
        }

        function startChat() {
            const val = document.getElementById('initialInput').value.trim();
            if (!val) return;
            newChat();
            appendMessage('user', val);
            processAI(val);
            document.getElementById('initialInput').value = '';
        }

        function sendMessage() {
            const val = document.getElementById('chatInput').value.trim();
            if (!val) return;
            if (!currentChatId) currentChatId = Date.now().toString();
            appendMessage('user', val);
            processAI(val);
            document.getElementById('chatInput').value = '';
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in mb-6`;
            const htmlContent = role === 'ai' ? marked.parse(text) : text;
            msgDiv.innerHTML = `<div class="${role === 'user' ? 'bg-gold-500 text-white shadow-gold-100' : 'bg-gray-50 text-gray-800 prose'} p-5 rounded-3xl max-w-[85%] shadow-sm border border-gray-100">${htmlContent}</div>`;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            saveToHistory(role, text);
            msgDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
        }

        function saveToHistory(role, text) {
            let history = JSON.parse(localStorage.getItem('khittara_history') || '{}');
            if (!history[currentChatId]) history[currentChatId] = { title: text.substring(0, 30) + '...', messages: [] };
            history[currentChatId].messages.push({ role, text });
            localStorage.setItem('khittara_history', JSON.stringify(history));
            loadHistoryList();
        }

        function loadHistoryList() {
            const history = JSON.parse(localStorage.getItem('khittara_history') || '{}');
            historyList.innerHTML = '';
            Object.keys(history).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = 'sidebar-item p-3 text-sm text-gray-600 flex items-center space-x-3';
                item.innerHTML = `<i class="far fa-comment-alt text-[10px]"></i> <span class="truncate">${history[id].title}</span>`;
                item.onclick = () => loadChat(id);
                historyList.appendChild(item);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            const history = JSON.parse(localStorage.getItem('khittara_history') || '{}');
            const chat = history[id];
            chatMessages.innerHTML = '';
            document.getElementById('homeView').classList.add('hidden-view');
            document.getElementById('chatView').classList.remove('hidden-view');
            chat.messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-6`;
                const htmlContent = msg.role === 'ai' ? marked.parse(msg.text) : msg.text;
                msgDiv.innerHTML = `<div class="${msg.role === 'user' ? 'bg-gold-500 text-white' : 'bg-gray-50 text-gray-800 prose'} p-5 rounded-3xl max-w-[85%] shadow-sm border border-gray-100">${htmlContent}</div>`;
                chatMessages.appendChild(msgDiv);
                msgDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function clearAllHistory() {
            if(confirm("Are you sure you want to clear all history?")) {
                localStorage.removeItem('khittara_history');
                loadHistoryList();
                newChat();
                toggleSettings();
            }
        }

        function showThinking() {
            if(document.getElementById('thinkingIndicator')) return;
            const thinkingDiv = document.createElement('div');
            thinkingDiv.id = 'thinkingIndicator';
            thinkingDiv.className = 'flex justify-start fade-in mb-6';
            thinkingDiv.innerHTML = `
                <div class="bg-gray-50 p-4 rounded-3xl flex items-center space-x-3 border border-gray-100">
                    <i class="fas fa-microchip thinking-glow text-lg"></i>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Thinking...</span>
                </div>`;
            chatMessages.appendChild(thinkingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideThinking() {
            const indicator = document.getElementById('thinkingIndicator');
            if (indicator) indicator.remove();
        }

        async function processAI(prompt) {
            showThinking();
            try {
                const aiResponse = await AI_CONFIG.fetchAIResponse(prompt);
                hideThinking();
                appendMessage('ai', aiResponse);
            } catch (error) {
                hideThinking();
                appendMessage('ai', `Error: ${error.message}`);
            }
        }

        // Enter key listeners
        document.getElementById('initialInput').onkeypress = (e) => e.key === 'Enter' && startChat();
        document.getElementById('chatInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
    </script>
</body>
</html>
