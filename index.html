<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Futuristic Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="ai-config.js"></script>
    
    <script>
        tailwind.config = { theme: { extend: { colors: { 'gold': { 500: '#eab308' } } } } }
    </script>
</head>
<body>

    <nav class="floating-sidebar flex flex-col space-y-4">
        <div class="sidebar-icon active-tab" onclick="switchView('home')">
            <i class="fas fa-home"></i><span class="sidebar-label">Home Dashboard</span>
        </div>
        <div class="sidebar-icon" onclick="newChat()">
            <i class="fas fa-plus"></i><span class="sidebar-label">Start New Chat</span>
        </div>
        <div class="mt-auto">
            <div class="sidebar-icon" onclick="toggleSettings()">
                <i class="fas fa-cog"></i><span class="sidebar-label">Settings</span>
            </div>
        </div>
    </nav>

    <section id="homeView" class="view-container view-active flex-col items-center justify-center p-6">
        <h1 class="text-6xl font-bold mb-12">Khittara <span class="text-gold-500">.</span></h1>
        <div class="w-full max-w-2xl px-4">
            <div class="flex items-center bg-white border border-gray-100 oval-input p-2 shadow-sm">
                <input type="text" id="initialInput" placeholder="How can I help you today?" class="flex-1 bg-transparent px-8 py-5 outline-none">
                <button onclick="startChat()" class="bg-gold-500 text-white w-14 h-14 rounded-full"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </section>

    <section id="chatView" class="view-container flex-col bg-white">
        <div id="chatMessages" class="flex-1 overflow-y-auto p-12 max-w-4xl mx-auto w-full pb-32"></div>
        <footer class="p-8 bg-white ml-24">
            <div class="max-w-4xl mx-auto flex items-center bg-gray-50 oval-input p-2 border">
                <input type="text" id="chatInput" placeholder="Type a message..." class="flex-1 bg-transparent px-8 py-3 outline-none">
                <button onclick="sendMessage()" class="bg-gold-500 text-white w-10 h-10 rounded-full"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </section>

    <div id="settingsModal" class="fixed inset-0 bg-black/20 backdrop-blur-md hidden items-center justify-center z-[2000]">
        </div>

    <script src="assets/js/navigation.js"></script>
    <script src="assets/js/chat.js"></script>
    <script>
        // Init logic
        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('khittara_api_key') || '';
            document.getElementById('modelInput').value = localStorage.getItem('khittara_model') || 'gemini-1.5-flash';
        };
        // Enter Key Handling
        document.getElementById('initialInput').addEventListener('keydown', (e) => e.key === 'Enter' && startChat());
        document.getElementById('chatInput').addEventListener('keydown', (e) => e.key === 'Enter' && sendMessage());
    </script>
</body>
</html>
