<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Futuristic Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="ai-config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { 'gold': { 400: '#fbbf24', 500: '#eab308', 600: '#ca8a04' } } }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #fcfcfc; height: 100vh; margin: 0; overflow: hidden; }
        
        .view-container { display: none; height: 100vh; width: 100vw; position: relative; }
        .view-active { display: flex !important; }

        /* Floating Glass Sidebar */
        .floating-sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            height: auto;
            max-height: 80vh;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(234, 179, 8, 0.2);
            border-radius: 40px;
            display: flex;
            flex-col: column;
            padding: 20px 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .floating-sidebar:hover { width: 240px; padding: 20px; border-radius: 30px; border-color: rgba(234, 179, 8, 0.5); }
        
        .sidebar-icon {
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px; color: #666;
            transition: all 0.3s; position: relative;
            cursor: pointer; overflow: hidden;
        }
        .floating-sidebar:hover .sidebar-icon { width: 100%; justify-content: start; padding-left: 15px; }
        
        .sidebar-icon i { font-size: 1.2rem; min-width: 25px; }
        .sidebar-label { opacity: 0; white-space: nowrap; margin-left: 15px; font-size: 0.85rem; font-weight: 500; transition: 0.3s; position: absolute; left: 50px; }
        .floating-sidebar:hover .sidebar-label { opacity: 1; }
        
        .sidebar-icon:hover { background: #eab308; color: white; transform: scale(1.05); box-shadow: 0 5px 15px rgba(234, 179, 8, 0.3); }

        .active-tab { background: rgba(234, 179, 8, 0.1); color: #ca8a04; border: 1px solid rgba(234, 179, 8, 0.2); }

        /* Input Styling */
        .oval-input { border-radius: 9999px; }
        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }

        @keyframes pulse-glow {
            0%, 100% { color: #10b981; filter: drop-shadow(0 0 2px #10b981); }
            50% { color: #eab308; filter: drop-shadow(0 0 8px #eab308); }
        }
        .thinking-glow { animation: pulse-glow 1.5s infinite; }
    </style>
</head>
<body>

    <nav class="floating-sidebar flex flex-col space-y-4">
        <div class="sidebar-icon active-tab" title="Home" onclick="switchView('home')">
            <i class="fas fa-home"></i>
            <span class="sidebar-label">Home Dashboard</span>
        </div>
        <div class="sidebar-icon" title="New Chat" onclick="newChat()">
            <i class="fas fa-plus"></i>
            <span class="sidebar-label">Start New Chat</span>
        </div>
        <div class="sidebar-icon" title="Lottery Analytics" onclick="alert('Analysis Feature Coming Soon!')">
            <i class="fas fa-chart-pie"></i>
            <span class="sidebar-label">Lottery Analysis</span>
        </div>
        <div class="sidebar-icon" title="Voice Lab" onclick="alert('Voice Lab Coming Soon!')">
            <i class="fas fa-microphone-alt"></i>
            <span class="sidebar-label">Voice & TTS</span>
        </div>
        <div class="sidebar-icon" title="History" onclick="alert('Recent History Injected in Chat View')">
            <i class="fas fa-history"></i>
            <span class="sidebar-label">Recent History</span>
        </div>
        <div class="mt-auto">
            <div class="sidebar-icon" title="Settings" onclick="toggleSettings()">
                <i class="fas fa-cog"></i>
                <span class="sidebar-label">Settings</span>
            </div>
        </div>
    </nav>

    <section id="homeView" class="view-container view-active flex-col items-center justify-center p-6 space-y-12 bg-white">
        <div class="text-center space-y-3">
            <h1 class="text-6xl font-bold tracking-tight text-gray-900">Khittara <span class="text-gold-500">.</span></h1>
            <p class="text-gray-400 font-light text-xl">The next generation AI platform.</p>
        </div>

        <div class="w-full max-w-2xl px-4">
            <div class="relative flex items-center bg-white border border-gray-100 oval-input p-2 shadow-[0_10px_50px_rgba(0,0,0,0.04)] focus-within:shadow-xl focus-within:border-gold-400 transition-all">
                <input type="text" id="initialInput" placeholder="How can I help you today?" 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-5 text-lg outline-none text-gray-700">
                <button onclick="startChat()" class="bg-gold-500 hover:bg-gold-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center transition-all active:scale-90">
                    <i class="fas fa-arrow-up text-xl"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="chatView" class="view-container flex-col bg-white">
        <header class="h-20 border-b border-gray-50 flex items-center justify-between px-12 ml-24">
            <h2 class="text-xl font-bold text-gray-800">Khittara <span class="text-gold-500">.</span></h2>
            <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#10b981]"></div>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-12 space-y-8 chat-scroll max-w-4xl mx-auto w-full pb-32 ml-24 md:ml-auto">
            </div>

        <footer class="p-8 bg-gradient-to-t from-white via-white to-transparent ml-24">
            <div class="max-w-4xl mx-auto flex items-center bg-gray-50 oval-input p-2 border border-gray-100 focus-within:bg-white focus-within:shadow-xl focus-within:border-gold-400 transition-all">
                <input type="text" id="chatInput" placeholder="Type a message..." 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-3 outline-none text-gray-700">
                <button onclick="sendMessage()" class="bg-gold-500 hover:bg-gold-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </footer>
    </section>

    <div id="settingsModal" class="fixed inset-0 bg-black/20 backdrop-blur-md hidden items-center justify-center z-[2000]">
        <div class="bg-white w-full max-w-md p-10 rounded-[40px] shadow-2xl mx-4">
            <h2 class="text-2xl font-bold mb-8">Settings</h2>
            <div class="space-y-6">
                <input type="password" id="apiKeyInput" placeholder="API Key" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none border border-transparent focus:border-gold-300">
                <input type="text" id="modelInput" placeholder="Model (e.g. gemini-1.5-flash)" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none border border-transparent focus:border-gold-300">
                <button onclick="saveSettings()" class="w-full bg-gold-500 text-white py-4 rounded-2xl font-bold hover:bg-gold-600 shadow-lg shadow-gold-100">Save Changes</button>
                <button onclick="toggleSettings()" class="w-full text-gray-400 text-xs mt-2">Close</button>
            </div>
        </div>
    </div>

    <script>
        let currentChatId = null;

        function switchView(viewName) {
            const home = document.getElementById('homeView');
            const chat = document.getElementById('chatView');
            if (viewName === 'home') {
                home.classList.add('view-active');
                chat.classList.remove('view-active');
            } else {
                home.classList.remove('view-active');
                chat.classList.add('view-active');
            }
        }

        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('khittara_api_key') || '';
            document.getElementById('modelInput').value = localStorage.getItem('khittara_model') || 'gemini-1.5-flash';
        };

        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            localStorage.setItem('khittara_api_key', document.getElementById('apiKeyInput').value.trim());
            localStorage.setItem('khittara_model', document.getElementById('modelInput').value.trim());
            toggleSettings();
        }

        function newChat() {
            currentChatId = Date.now().toString();
            document.getElementById('chatMessages').innerHTML = '';
            switchView('chat');
            setTimeout(() => document.getElementById('chatInput').focus(), 100);
        }

        function startChat() {
            const val = document.getElementById('initialInput').value.trim();
            if (!val) return;
            newChat();
            appendMessage('user', val);
            processAI(val);
            document.getElementById('initialInput').value = '';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const val = input.value.trim();
            if (!val) return;
            if (!currentChatId) currentChatId = Date.now().toString();
            appendMessage('user', val);
            processAI(val);
            input.value = '';
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-8`;
            const htmlContent = role === 'ai' ? marked.parse(text) : text;
            msgDiv.innerHTML = `<div class="${role === 'user' ? 'bg-gold-500 text-white shadow-lg' : 'bg-gray-100 text-gray-800 prose'} p-6 rounded-[2rem] max-w-[85%]">${htmlContent}</div>`;
            document.getElementById('chatMessages').appendChild(msgDiv);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            msgDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        }

        function showThinking() {
            if(document.getElementById('thinkingIndicator')) return;
            const div = document.createElement('div');
            div.id = 'thinkingIndicator';
            div.className = 'flex justify-start mb-8';
            div.innerHTML = `<div class="bg-gray-50 p-4 rounded-3xl flex items-center space-x-3"><i class="fas fa-microchip thinking-glow"></i><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Khittara is thinking...</span></div>`;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        function hideThinking() {
            const el = document.getElementById('thinkingIndicator');
            if (el) el.remove();
        }

        async function processAI(prompt) {
            showThinking();
            try {
                const aiResponse = await AI_CONFIG.fetchAIResponse(prompt);
                hideThinking();
                appendMessage('ai', aiResponse);
            } catch (error) {
                hideThinking();
                appendMessage('ai', `Error: ${error.message}`);
            }
        }

        document.getElementById('initialInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') startChat(); });
        document.getElementById('chatInput').addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
