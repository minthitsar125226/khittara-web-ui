<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khittara AI - Personal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script src="ai-config.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'gold': { 50: '#fffbeb', 100: '#fef9c3', 500: '#eab308', 600: '#ca8a04' } }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { background-color: #ffffff; font-family: 'Poppins', sans-serif; overflow: hidden; }
        .oval-input { border-radius: 9999px; }
        .hidden-view { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #eab308; border-radius: 10px; }

        /* Markdown Styling */
        .prose pre { background: #1e1e1e; padding: 1.25rem; border-radius: 1rem; overflow-x: auto; margin: 15px 0; border: 1px solid #333; }
        .prose code { font-family: 'Fira Code', monospace; font-size: 0.9em; color: #f59e0b; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose h1, .prose h2, .prose h3 { font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; }
        .prose p { margin-bottom: 0.75rem; }
    </style>
</head>
<body class="h-screen relative text-gray-800">

    <button onclick="toggleSettings()" class="absolute top-8 right-8 text-gray-300 hover:text-gold-600 transition-all duration-300 z-50">
        <i class="fas fa-cog text-2xl"></i>
    </button>

    <section id="homeView" class="h-full flex flex-col items-center justify-center p-6 space-y-12 fade-in">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-bold tracking-tight">Khittara <span class="text-gold-500 text-6xl">.</span></h1>
            <p class="text-gray-400 font-light">The next generation AI platform.</p>
        </div>

        <div class="w-full max-w-2xl relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-gold-100 to-gold-50 rounded-[50px] blur opacity-20 group-focus-within:opacity-100 transition duration-1000"></div>
            <div class="relative flex items-center bg-white border border-gray-100 oval-input p-2 shadow-sm focus-within:shadow-lg transition-all">
                <input type="text" id="initialInput" placeholder="Ask anything to Khittara..." 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-5 text-lg outline-none">
                <button onclick="startChat()" class="bg-gold-500 hover:bg-gold-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center transition-transform active:scale-90">
                    <i class="fas fa-arrow-up text-xl"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="chatView" class="h-full flex flex-col hidden-view bg-white">
        <header class="p-6 border-b border-gray-50 flex justify-between items-center px-12 bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <h2 class="text-xl font-bold text-gray-900 cursor-pointer flex items-center group" onclick="goHome()">
                <i class="fas fa-chevron-left mr-3 text-sm text-gray-300 group-hover:text-gold-500 transition-all"></i>
                Khittara <span class="text-gold-500 ml-1">.</span>
            </h2>
            <div class="flex items-center space-x-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <span id="activeModelLabel">Model Ready</span>
                <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full"></div>
            </div>
        </header>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-12 space-y-8 chat-scroll max-w-4xl mx-auto w-full pb-32"></div>

        <footer class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-white via-white to-transparent">
            <div class="max-w-4xl mx-auto flex items-center bg-gray-50 oval-input p-2 border border-gray-100 focus-within:bg-white focus-within:border-gold-300 focus-within:shadow-xl transition-all">
                <input type="text" id="chatInput" placeholder="Send a message..." 
                       class="flex-1 bg-transparent border-none focus:ring-0 px-8 py-3 outline-none">
                <button onclick="sendMessage()" class="bg-gold-500 hover:bg-gold-600 text-white w-10 h-10 rounded-full shadow-md">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </footer>
    </section>

    <div id="settingsModal" class="fixed inset-0 bg-black/10 backdrop-blur-md flex items-center justify-center hidden-view z-50">
        <div class="bg-white border border-gray-100 w-full max-w-md p-10 rounded-[40px] shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Settings</h2>
                <button onclick="toggleSettings()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none border border-transparent focus:border-gold-300">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Preferred Model</label>
                    <input type="text" id="modelInput" placeholder="gemini-2.5-flash" class="w-full bg-gray-50 rounded-2xl p-4 text-sm outline-none border border-transparent focus:border-gold-300">
                </div>
                <button onclick="saveSettings()" class="w-full bg-gold-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-gold-100 active:scale-95 transition-all">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const homeView = document.getElementById('homeView');
        const chatView = document.getElementById('chatView');
        const initialInput = document.getElementById('initialInput');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');

        window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('khittara_api_key') || '';
            document.getElementById('modelInput').value = localStorage.getItem('khittara_model') || 'gemini-2.5-flash';
            updateModelLabel();
        };

        function updateModelLabel() {
            const m = localStorage.getItem('khittara_model') || 'gemini-2.5-flash';
            document.getElementById('activeModelLabel').innerText = m;
        }

        function toggleSettings() {
            document.getElementById('settingsModal').classList.toggle('hidden-view');
        }

        function saveSettings() {
            const key = document.getElementById('apiKeyInput').value.trim();
            const model = document.getElementById('modelInput').value.trim();
            if(key) localStorage.setItem('khittara_api_key', key);
            if(model) localStorage.setItem('khittara_model', model);
            updateModelLabel();
            toggleSettings();
        }

        function goHome() {
            chatView.classList.add('hidden-view');
            homeView.classList.remove('hidden-view');
        }

        initialInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') startChat(); });
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function startChat() {
            const val = initialInput.value.trim();
            if (!val) return;
            homeView.classList.add('hidden-view');
            chatView.classList.remove('hidden-view');
            appendMessage('user', val);
            processAI(val);
            initialInput.value = '';
        }

        function sendMessage() {
            const val = chatInput.value.trim();
            if (!val) return;
            appendMessage('user', val);
            processAI(val);
            chatInput.value = '';
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
            
            // Markdown Parsing
            const htmlContent = role === 'ai' ? marked.parse(text) : text;

            msgDiv.innerHTML = role === 'user' 
                ? `<div class="bg-gold-500 text-white p-5 rounded-3xl rounded-tr-none max-w-[85%] shadow-sm">${htmlContent}</div>`
                : `<div class="bg-gray-50 text-gray-800 p-5 rounded-3xl rounded-tl-none max-w-[85%] border border-gray-100 shadow-sm leading-relaxed prose">${htmlContent}</div>`;
            
            chatMessages.appendChild(msgDiv);
            
            // Apply Highlight.js to code blocks
            msgDiv.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function processAI(prompt) {
            const statusDot = document.getElementById('statusDot');
            statusDot.className = 'w-2 h-2 bg-yellow-500 rounded-full animate-pulse';

            try {
                const aiResponse = await AI_CONFIG.fetchAIResponse(prompt);
                appendMessage('ai', aiResponse);
            } catch (error) {
                appendMessage('ai', `Error: ${error.message}`);
            } finally {
                statusDot.className = 'w-2 h-2 bg-green-500 rounded-full';
            }
        }
    </script>
</body>
</html>
