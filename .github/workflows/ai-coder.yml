name: AI Auto-Coder (Fixed Model)
on:
  issues:
    types: [opened, edited]

jobs:
  auto_fix:
    if: contains(github.event.issue.title, 'AI-FIX')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        shell: python
        run: |
          import os, requests, json, re

          api_key = os.getenv("GEMINI_API_KEY")
          issue_body = os.getenv("ISSUE_BODY")

          # ၁။ Repo Structure ဆွဲထုတ်ခြင်း
          repo_files = []
          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file).replace("./", "")
                  if not any(x in path for x in ['.git/', 'node_modules/', '__pycache__', '.github/']):
                      repo_files.append(path)
          
          file_tree = "\n".join(repo_files)

          def call_gemini(prompt):
              # Pydroid 3 ကရတဲ့ List ထဲက Model နာမည် (gemini-2.5-flash ကို သုံးထားသည်)
              model_name = "gemini-2.5-flash" 
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model_name}:generateContent?key={api_key}"
              
              payload = {
                  "contents": [{ 
                      "role": "user",
                      "parts": [{ "text": prompt }] 
                  }]
              }
              
              response = requests.post(url, json=payload)
              if response.status_code != 200:
                  print(f"Error from API: {response.status_code} - {response.text}")
                  return ""
              
              res_json = response.json()
              return res_json['candidates'][0]['content']['parts'][0]['text']

          # ၂။ ပြင်ရမည့်ဖိုင်များ ရွေးချယ်ခြင်း
          identify_prompt = f"Project Structure:\n{file_tree}\n\nTask: {issue_body}\nIdentify files to edit. Return ONLY file paths, one per line."
          
          selected_files_text = call_gemini(identify_prompt).strip()
          if not selected_files_text:
              print("No files identified or API error.")
              exit(0)
              
          files_to_fix = [f.strip() for f in selected_files_text.split('\n') if f.strip()]

          # ၃။ Code ပြင်ဆင်ခြင်း
          for file_path in files_to_fix:
              file_path = file_path.replace('`', '').replace('./', '')
              original_content = ""
              if os.path.exists(file_path):
                  with open(file_path, 'r') as f:
                      original_content = f.read()
              
              edit_prompt = f"File: {file_path}\nContent:\n{original_content}\n\nTask: {issue_body}\nReturn ONLY updated code. No markdown, no text."
              updated_code = call_gemini(edit_prompt)
              
              if updated_code:
                  clean_code = re.sub(r'^```[a-z]*\n|```$', '', updated_code, flags=re.MULTILINE).strip()
                  os.makedirs(os.path.dirname(file_path) or '.', exist_ok=True)
                  with open(file_path, 'w') as f:
                      f.write(clean_code)
                  print(f"Updated: {file_path}")

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Automated updates for Issue #${{ github.event.issue.number }}"
          branch: main
