name: AI Auto-Coder
on:
  issues:
    types: [opened, edited]

jobs:
  auto_fix:
    # Issue Title မှာ AI-FIX ပါမှ အလုပ်လုပ်မည်
    if: contains(github.event.issue.title, 'AI-FIX')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        shell: python
        run: |
          import os, requests, json, re

          api_key = os.getenv("GEMINI_API_KEY")
          issue_body = os.getenv("ISSUE_BODY")

          # ၁။ Repo Structure တစ်ခုလုံးကို ဆွဲထုတ်ခြင်း (Tree Structure)
          repo_files = []
          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file).replace("./", "")
                  # မလိုအပ်သော folder များကို ဖယ်ထုတ်ခြင်း
                  if not any(x in path for x in ['.git/', 'node_modules/', '__pycache__', '.github/']):
                      repo_files.append(path)
          
          file_tree = "\n".join(repo_files)

          def call_gemini(prompt):
              # သင်အသုံးပြုလိုသော Model (gemini-2.5-flash)
              model = "gemini-2.5-flash"
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"
              
              payload = {
                  "contents": [{ 
                      "role": "user",
                      "parts": [{ "text": prompt }] 
                  }]
              }
              
              try:
                  response = requests.post(url, json=payload)
                  res_json = response.json()
                  return res_json['candidates'][0]['content']['parts'][0]['text']
              except Exception as e:
                  print(f"Error calling API: {e}")
                  return ""

          # ၂။ AI ကို Project Structure ပြပြီး ပြင်ရမယ့်ဖိုင်များကို ရွေးခိုင်းခြင်း
          identify_prompt = f"""
          You are a Senior Full-Stack Developer.
          Here is the project structure:
          {file_tree}

          User Request: {issue_body}

          Task: Identify ALL files that need to be modified or created to fulfill this request.
          Return ONLY the file paths, one per line. No explanation or backticks.
          """
          
          selected_files_text = call_gemini(identify_prompt).strip()
          files_to_fix = [f.strip() for f in selected_files_text.split('\n') if f.strip()]
          
          print(f"AI selected these files to update: {files_to_fix}")

          # ၃။ ရွေးချယ်ထားသော ဖိုင်များကို တစ်ခုချင်းစီ လိုက်ပြင်ခြင်း
          for file_path in files_to_fix:
              file_path = file_path.replace('`', '').replace('./', '')
              
              original_content = ""
              if os.path.exists(file_path):
                  with open(file_path, 'r') as f:
                      original_content = f.read()
              
              edit_prompt = f"""
              File Path: {file_path}
              Current Content:
              {original_content if original_content else "[New File]"}

              User Request: {issue_body}

              Task: Provide the full updated code for this file only. 
              Ensure it integrates perfectly with the rest of the project.
              Return ONLY the raw code. No markdown blocks, no explanations.
              """
              
              updated_code = call_gemini(edit_prompt)
              
              # Markdown formatting များပါလာပါက ဖယ်ထုတ်ခြင်း
              clean_code = re.sub(r'^```[a-z]*\n|```$', '', updated_code, flags=re.MULTILINE).strip()

              # Folder မရှိပါက ဆောက်ပေးခြင်း
              os.makedirs(os.path.dirname(file_path) or '.', exist_ok=True)
              
              with open(file_path, 'w') as f:
                  f.write(clean_code)
              print(f"Successfully updated: {file_path}")

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Automated updates for Issue #${{ github.event.issue.number }}"
          branch: main
