name: AI Engineer (Force Update Version)
on:
  issues:
    types: [opened, edited]

jobs:
  professional_fix:
    if: contains(github.event.issue.title, 'AI-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Advanced AI Logic (Think-Before-Act)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        shell: python
        run: |
          import os, requests, json, re

          api_key = os.getenv("GEMINI_API_KEY")
          issue_body = os.getenv("ISSUE_BODY")
          
          repo_files = []
          for root, dirs, files in os.walk("."):
              for file in files:
                  path = os.path.join(root, file).replace("./", "")
                  if not any(x in path for x in ['.git/', 'node_modules/', '.github/']):
                      repo_files.append(path)
          file_tree = "\n".join(repo_files)

          def call_gemini(prompt):
              model = "gemini-2.5-flash" 
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"
              payload = {"contents": [{"role": "user", "parts": [{"text": prompt}]}]}
              response = requests.post(url, json=payload)
              if response.status_code == 200:
                  return response.json()['candidates'][0]['content']['parts'][0]['text']
              return ""

          # Planning
          plan = call_gemini(f"Project: {file_tree}\nTask: {issue_body}\nCreate a Senior Engineer Plan.")
          print(f"Plan: {plan}")

          # Identify files
          files_to_fix = [f.strip() for f in call_gemini(f"Plan: {plan}\nReturn ONLY file paths to edit.").split('\n') if f.strip()]

          for file_path in files_to_fix:
              file_path = file_path.replace('`', '').replace('./', '')
              original_content = ""
              if os.path.exists(file_path):
                  with open(file_path, 'r', encoding='utf-8') as f:
                      original_content = f.read()
              
              edit_prompt = f"File: {file_path}\nOriginal: {original_content}\nPlan: {plan}\nTask: {issue_body}\nReturn ONLY full updated code."
              updated_code = call_gemini(edit_prompt)
              clean_code = re.sub(r'^```[a-z]*\n|```$', '', updated_code, flags=re.MULTILINE).strip()
              
              if clean_code:
                  os.makedirs(os.path.dirname(file_path) or '.', exist_ok=True)
                  # Force write with UTF-8
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(clean_code)
                  print(f"File {file_path} has been overwritten.")

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "AI-PRO: Strict fix for Issue #${{ github.event.issue.number }}"
          branch: ai-engineering-branch-v2
          delete-branch: true
          title: "AI Review: Precision Fix for Issue #${{ github.event.issue.number }}"
          body: |
            ### 🎯 Precision Fixes Applied
            - Fixed Sidebar Toggle Logic
            - Cleaned UI text Remnants
            - Ensured proper file separation
          base: main
