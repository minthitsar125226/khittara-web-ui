name: AI Auto-Coder
on:
  issues:
    types: [opened, edited]

jobs:
  auto_fix:
    if: contains(github.event.issue.title, 'AI-FIX')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent Logic
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        shell: python
        run: |
          import os
          import requests
          import json
          import re

          api_key = os.getenv("GEMINI_API_KEY")
          issue_body = os.getenv("ISSUE_BODY")

          def call_gemini(prompt):
              url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
              headers = {'Content-Type': 'application/json'}
              data = {"contents": [{"parts": [{"text": prompt}]}]}
              response = requests.post(url, headers=headers, data=json.dumps(data))
              if response.status_code != 200:
                  raise Exception(f"API Error: {response.text}")
              return response.json()['candidates'][0]['content']['parts'][0]['text']

          # ၁။ ပြင်ရမယ့်ဖိုင်ကို ရှာဖွေခြင်း
          all_files = []
          for root, dirs, files in os.walk("."):
              for file in files:
                  if not any(x in root for x in ['.git', 'node_modules', '__pycache__']):
                      all_files.append(os.path.join(root, file))

          print(f"Available files: {all_files}")

          # ၂။ ဘယ်ဖိုင်ပြင်ရမလဲ AI ကို မေးခြင်း
          select_prompt = f"Files: {all_files}\nRequest: {issue_body}\nReturn ONLY the exact file path to edit."
          file_to_edit = call_gemini(select_prompt).strip().replace('`', '').lstrip('./')

          if os.path.exists(file_to_edit):
              print(f"Editing file: {file_to_edit}")
              with open(file_to_edit, 'r') as f:
                  original_content = f.read()

              # ၃။ Code ပြင်ဆင်ခြင်း
              edit_prompt = f"File: {file_to_edit}\nCode:\n{original_content}\n\nRequest: {issue_body}\nReturn ONLY the updated code."
              updated_code = call_gemini(edit_prompt)
              clean_code = re.sub(r'^```[a-z]*\n|```$', '', updated_code, flags=re.MULTILINE).strip()

              with open(file_to_edit, 'w') as f:
                  f.write(clean_code)
              print("File updated successfully.")
          else:
              print(f"Error: AI selected {file_to_edit} but it doesn't exist.")

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Automated update based on Issue"
          branch: main
