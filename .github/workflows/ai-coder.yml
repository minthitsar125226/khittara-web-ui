name: AI Auto-Coder
on:
  issues:
    types: [opened, edited]

jobs:
  auto_fix:
    if: contains(github.event.issue.title, 'AI-FIX')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Folder နှစ်ထပ်ဖြစ်နေတဲ့ ပြဿနာကို ဖြေရှင်းရန် ဖိုင်ကို လိုက်ရှာပါသည်
          REAL_PATH=$(find . -name "ai_processor.py" | head -n 1)
          
          if [ -z "$REAL_PATH" ]; then
            echo "Error: ai_processor.py not found!"
            exit 1
          fi
          
          echo "Executing AI Agent at: $REAL_PATH"
          python3 "$REAL_PATH"

      - name: Commit & Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Automated update based on Issue #${{ github.event.issue.number }}"
          branch: main
